# 工作流名称
name: Deploy VitePress site to Pages

# 触发条件
on:
  # 推送到 main 分支时触发（若默认分支是 master，请修改）
  push:
    branches: [master]
  # 支持手动触发
  workflow_dispatch:

# 权限设置
permissions:
  contents: read      # 读取仓库代码
  pages: write        # 部署到 GitHub Pages
  id-token: write     # 用于身份验证

# 并发控制：只允许一个部署任务运行，且不取消正在进行的任务
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建作业
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # 获取完整历史（用于 lastUpdated）

      # 设置 pnpm（使用你指定的版本 10.32.1）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1   # 与你的本地 pnpm 版本一致

      # 设置 Node.js（使用你指定的版本 23.11.0）
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 23        # 匹配你本地的 v23.11.0（大版本 23 即可）
          cache: pnpm             # 缓存 pnpm 依赖

      # 配置 GitHub Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 安装依赖（使用 pnpm）
      - name: Install dependencies
        run: pnpm install   # 如果希望严格按 lockfile 安装，可改为 pnpm install --frozen-lockfile

      # 构建 VitePress 站点
      - name: Build with VitePress
        run: pnpm docs:build   # 确保 package.json 中有该脚本
        touch .nojekyll  # 通知githubpages不要使用Jekyll处理这个站点，不知道为啥不生效，就手动搞了

      # 上传构建产物（默认输出目录）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  # 部署作业
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build          # 等待构建完成
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
